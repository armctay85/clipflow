<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipFlow AI — Turn Videos Into Content Machines</title㳣
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        :root {
            --indigo: #6366f1;
            --indigo-dark: #4f46e5;
            --indigo-light: #818cf8;
            --violet: #8b5cf6;
            --fuchsia: #d946ef;
            --dark: #020617;
            --dark-lighter: #0f172a;
            --dark-card: #1e293b;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
        }
        
        html { scroll-behavior: smooth; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Animated gradient background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 50%, rgba(139, 92, 246, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 20% 80%, rgba(217, 70, 239, 0.08), transparent);
            pointer-events: none;
            z-index: 0;
        }
        
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }
        
        /* Navigation */
        nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000;
            padding: 20px 0;
            transition: all 0.3s ease;
        }
        
        nav.scrolled {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .nav-container { 
            max-width: 1280px; 
            margin: 0 auto; 
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { 
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: -0.02em;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        
        .nav-links { 
            display: flex; 
            gap: 8px; 
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .nav-links a { 
            text-decoration: none; 
            color: var(--gray-400); 
            font-weight: 500;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 100px;
            transition: all 0.2s ease;
        }
        
        .nav-links a:hover { 
            color: #fff;
            background: rgba(255,255,255,0.05);
        }
        
        .nav-cta {
            background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-dark) 100%) !important;
            color: #fff !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        
        .nav-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.4);
        }
        
        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 32px 100px;
            position: relative;
            z-index: 10;
        }
        
        .hero-content {
            max-width: 1280px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 80px;
            align-items: center;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(139,92,246,0.1) 100%);
            border: 1px solid rgba(99,102,241,0.2);
            color: var(--indigo-light);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
        }
        
        .hero-badge .pulse {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .hero h1 { 
            font-size: 64px; 
            font-weight: 800; 
            line-height: 1.05; 
            margin-bottom: 28px;
            letter-spacing: -0.03em;
        }
        
        .hero h1 .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--indigo-light) 50%, var(--fuchsia) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-description {
            font-size: 20px; 
            color: var(--gray-400); 
            margin-bottom: 40px;
            line-height: 1.7;
            max-width: 480px;
        }
        
        .cta-group { 
            display: flex; 
            gap: 16px; 
            margin-bottom: 48px;
        }
        
        .btn { 
            padding: 18px 32px; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            text-decoration: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-dark) 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.5), 0 0 0 1px rgba(255,255,255,0.15) inset;
        }
        
        .btn-secondary { 
            background: rgba(255,255,255,0.05);
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .btn-secondary:hover { 
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }
        
        .hero-stats {
            display: flex;
            gap: 48px;
            padding-top: 32px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--indigo-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--gray-500);
        }
        
        /* Demo Interface */
        .hero-demo {
            position: relative;
        }
        
        .demo-container {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            box-shadow: 
                0 50px 100px -20px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.05) inset;
            backdrop-filter: blur(20px);
        }
        
        .demo-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .demo-dots {
            display: flex;
            gap: 8px;
        }
        
        .demo-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .demo-dot.red { background: #ef4444; }
        .demo-dot.yellow { background: #f59e0b; }
        .demo-dot.green { background: #10b981; }
        
        .demo-tabs {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        
        .demo-tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 12px;
            color: var(--gray-400);
        }
        
        .demo-tab.active {
            background: rgba(99,102,241,0.15);
            border-color: rgba(99,102,241,0.3);
            color: var(--indigo-light);
        }
        
        .demo-content {
            padding: 24px;
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .url-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--gray-300);
            font-size: 14px;
            font-family: inherit;
        }
        
        .url-input:focus {
            outline: none;
            border-color: var(--indigo);
        }
        
        .process-btn {
            background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-dark) 100%);
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        
        .output-grid {
            display: grid;
            gap: 16px;
        }
        
        .output-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
        }
        
        .output-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .platform-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        
        .platform-icon.linkedin {
            background: #0077b5;
            color: white;
        }
        
        .platform-icon.twitter {
            background: #000;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .platform-icon.instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }
        
        .platform-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .platform-status {
            margin-left: auto;
            font-size: 12px;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .platform-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
        }
        
        .output-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--gray-300);
        }
        
        /* Logo Cloud */
        .logo-cloud {
            padding: 80px 0;
            position: relative;
            z-index: 10;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo-cloud-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            text-align: center;
        }
        
        .logo-cloud p {
            font-size: 14px;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 40px;
        }
        
        .logos-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
            flex-wrap: wrap;
        }
        
        .logo-item {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-600);
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .logo-item:hover {
            opacity: 1;
        }
        
        /* Features */
        .features {
            padding: 140px 0;
            position: relative;
            z-index: 10;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }
        
        .section-header {
            text-align: center;
            max-width: 640px;
            margin: 0 auto 80px;
        }
        
        .section-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.2);
            color: var(--indigo-light);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        
        .section-header h2 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        
        .section-header p {
            font-size: 18px;
            color: var(--gray-400);
            line-height: 1.7;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        .feature-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.3) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .feature-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99,102,241,0.2);
            box-shadow: 0 20px 60px -20px rgba(99,102,241,0.2);
        }
        
        .feature-card:hover::before {
            opacity: 1;
        }
        
        .feature-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(139,92,246,0.1) 100%);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 28px;
            position: relative;
        }
        
        .feature-icon::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--indigo) 0%, transparent 50%);
            opacity: 0.3;
            z-index: -1;
        }
        
        .feature-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .feature-card p {
            color: var(--gray-400);
            line-height: 1.7;
            font-size: 15px;
        }
        
        /* How it Works */
        .how-it-works {
            padding: 140px 0;
            position: relative;
            z-index: 10;
            background: linear-gradient(180deg, transparent 0%, rgba(99,102,241,0.03) 50%, transparent 100%);
        }
        
        .steps-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }
        
        .step-card {
            position: relative;
            padding: 40px 32px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            text-align: center;
        }
        
        .step-number {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            margin: 0 auto 24px;
            box-shadow: 0 10px 40px rgba(99,102,241,0.3);
            position: relative;
        }
        
        .step-number::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--indigo) 0%, transparent 70%);
            opacity: 0.3;
            z-index: -1;
        }
        
        .step-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .step-card p {
            color: var(--gray-400);
            font-size: 15px;
            line-height: 1.7;
        }
        
        /* Pricing */
        .pricing {
            padding: 140px 0;
            position: relative;
            z-index: 10;
        }
        
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .pricing-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.3) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            position: relative;
            transition: all 0.4s;
        }
        
        .pricing-card:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-4px);
        }
        
        .pricing-card.popular {
            background: linear-gradient(145deg, rgba(99,102,241,0.15) 0%, rgba(30, 41, 59, 0.5) 100%);
            border-color: rgba(99,102,241,0.3);
            transform: scale(1.05);
            box-shadow: 0 30px 60px -20px rgba(99,102,241,0.2);
        }
        
        .pricing-card.popular:hover {
            transform: scale(1.05) translateY(-4px);
        }
        
        .popular-badge {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
        }
        
        .pricing-card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .pricing-description {
            color: var(--gray-400);
            font-size: 15px;
            margin-bottom: 28px;
        }
        
        .pricing-amount {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .price {
            font-size: 56px;
            font-weight: 800;
            line-height: 1;
        }
        
        .price span {
            font-size: 16px;
            color: var(--gray-500);
            font-weight: 500;
        }
        
        .original-price {
            font-size: 18px;
            color: var(--gray-600);
            text-decoration: line-through;
            margin-bottom: 32px;
        }
        
        .pricing-features {
            list-style: none;
            margin-bottom: 32px;
        }
        
        .pricing-features li {
            padding: 12px 0;
            color: var(--gray-300);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .pricing-features li:last-child {
            border-bottom: none;
        }
        
        .pricing-features li::before {
            content: "✓";
            color: #10b981;
            font-weight: bold;
            width: 20px;
            height: 20px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
        }
        
        .pricing-card .btn {
            width: 100%;
            justify-content: center;
        }
        
        /* Testimonials */
        .testimonials {
            padding: 140px 0;
            position: relative;
            z-index: 10;
            background: linear-gradient(180deg, rgba(99,102,241,0.03) 0%, transparent 100%);
        }
        
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        .testimonial-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.2) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 32px;
        }
        
        .testimonial-stars {
            color: #f59e0b;
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .testimonial-text {
            font-size: 16px;
            line-height: 1.8;
            color: var(--gray-300);
            margin-bottom: 24px;
        }
